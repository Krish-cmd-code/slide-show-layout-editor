<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="slider.css">
</head>
<body>
    <!-- <div class="inputs draggable">
        
    </div> -->

        <input type="file" id="optBtn" accept="/*image" multiple hidden>
        <button  id="btn1" class="draggable" ><label for="optBtn">select images</label></button>
        <button type="button"  id="slideShowBtn" class="draggable">startSlideShow</button>
        <button type="button"  id="deleteBtn" class="draggable">deleteImages</button>
        <button type="button"  id="saveSlideShow" class="draggable">saveSlideShow</button>
        <!-- <button type="button" id="reloadSlideShow">reloadSlideShow</button> -->
         <input type="file" id="reloadJson" accept=".json" hidden>
         <button  id="btn2" class="draggable"><label for="reloadJson">Load Json</label></button>
        <button type="button" id="customize" class="draggable">Customize</button>
        <button type="button"  id="stopCustomize" class="draggable" disabled>stopCustomize</button>
        <input type="number" id="delay" class="draggable" placeholder="enter delay">
        <!-- <button><label for="delay">Enter Delay</label></button> -->
        
    <div  id="galleryContainer" class="galleryContainer draggable">
        <h3>Gallery:</h3>
        <div class="gallery drag" id="gallery" ></div>
    </div>
    
    <div id="reorderContainer" class="galleryContainer draggable">
        <h3>Reorder images</h3><span class="dropBox" id="dropBox">DROPBOX</span><br>
        <div class="reorder" id="reorder"></div>
    </div>
    
    <div id="slideShow" class="galleryContainer draggable">
        <img id="previewImage">
        <!--  
            <div class="slideShowButton">
                <button type="buttton" id="playSlide">play</button>
            </div>
         -->
    </div>

    <script src="slider.js"></script>
</body>
</html>
