<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="slider.css">
</head>
<body>
        <input type="file" id="optBtn" accept="/*image" multiple hidden>
        <button class="dragon"><label for="optBtn">select images</label></button>
        <button type="button" class="dragon" id="slideShowBtn">startSlideShow</button>
        <button type="button" class="dragon" id="deleteBtn">deleteImages</button>
        <button type="button" class="dragon" id="saveSlideShow">saveSlideShow</button>
        <!-- <button type="button" id="reloadSlideShow">reloadSlideShow</button> -->
         <input type="file" id="reloadJson" accept=".json" hidden>
         <button class="dragon"><label for="reloadJson">Load Json</label></button>
        <button type="button" class="dragon" id="customize">Customize</button>
        <button type="button" class="dragon" id="stopCustomize" disabled>stopCustomize</button>
        <input type="number" class="dragon" id="delay" required placeholder="enter delay">
        <!-- <button><label for="delay">Enter Delay</label></button> -->
    <br>
    <br>
    <br>
    <div class="gallery drag">

    </div>
    <div id="slideShow" class="drag">
        <img id="previewImage">
        <!--  
            <div class="slideShowButton">
                <button type="buttton" id="playSlide">play</button>
            </div>
         -->
    </div>

    <p id="demo"></p>
    <script src="slider.js"></script>
</body>
</html>
