<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="slider.css">
</head>
<body>
    <!-- <div class="inputs draggable">
        
    </div> -->

        <div class="draggable" id="d1">
            <input type="file" id="optBtn" accept="/*image" multiple hidden>
            <button type="button"  id="btn1"><label for="optBtn">select images</label></button>
        </div>
        <div class="draggable" id="d2">
            <button type="button"  id="slideShowBtn" >startSlideShow</button>
        </div>
        <div class="draggable" id="d3">
            <button type="button"  id="deleteBtn">deleteImages</button>
        </div>
        <div class="draggable" id="d4">
            <button type="button"  id="saveSlideShow">saveSlideShow</button>
        </div>
        <div class="draggable" id="d5">
            <input type="file" id="reloadJson" accept=".json" hidden>
            <button  id="btn2" ><label for="reloadJson">Load Json</label></button>
        </div>
        <div class="draggable" id="d6">
            <button type="button" id="customize">Customize</button>
        </div>
        <div class="draggable" id="d7">
            <input type="number" id="delay" placeholder="enter delay">
        </div>
        
    <div  id="galleryContainer" class="galleryContainer draggable">
        <h3>Gallery:</h3>
        <div class="gallery drag" id="gallery" ></div>
    </div>
    
    <div id="reorderContainer" class="galleryContainer draggable">
        <h3>Reorder images</h3><span class="dropBox" id="dropBox">DROPBOX</span><br>
        <div class="reorder" id="reorder"></div>
    </div>
    
    <div id="slideShow" class="galleryContainer draggable">
        <img id="previewImage">
        <!--  
            <div class="slideShowButton">
                <button type="buttton" id="playSlide">play</button>
            </div>
         -->
    </div>

    <script src="slider.js"></script>
</body>
</html>
